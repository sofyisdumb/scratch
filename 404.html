<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4d97ff">

    <style>
        body {
            background: #0b0b0b;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            text-align: center;
            background: #161616;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #333;
            max-width: 400px;
        }

        .loader {
            border: 4px solid #222;
            border-top: 4px solid #4d97ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        h2 {
            margin: 0;
            font-size: 1.2rem;
        }

        p {
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div class="box">
        <div id="loader" class="loader"></div>
        <h2 id="title">Connecting to Scratch...</h2>
        <p id="msg">Verifying project ID...</p>
    </div>

    <script>
        async function init() {
            const titleEl = document.getElementById('title');
            const msgEl = document.getElementById('msg');

            const parts = window.location.pathname.split('/').filter(Boolean);
            const id = parts[parts.length - 1];

            if (!id || isNaN(id)) {
                titleEl.innerText = "Error";
                msgEl.innerText = "Please provide a valid Scratch Project ID in the URL.";
                document.getElementById('loader').style.display = 'none';
                return;
            }

            try {
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://api.scratch.mit.edu/projects/' + id)}`);
                const wrapper = await response.json();

                if (!wrapper.contents) throw new Error();
                const data = JSON.parse(wrapper.contents);

                titleEl.innerText = data.title;
                msgEl.innerText = `By ${data.author.username}. Redirecting...`;

                setTimeout(() => {
                    window.location.href = `https://scratch.mit.edu/projects/${id}/`;
                }, 800);

            } catch (e) {
                titleEl.innerText = "Project Found";
                msgEl.innerText = "Redirecting you now...";
                window.location.href = `https://scratch.mit.edu/projects/${id}/`;
            }
        }

        init();
    </script>
</body>
</html>
