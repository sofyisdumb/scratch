<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }
        .container {
            max-width: 800px;
            background: #222;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        img#thumbnail {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid #4d97ff;
        }
        h1 { margin: 10px 0; color: #4d97ff; }
        p#author { font-style: italic; color: #aaa; }
        #description {
            text-align: left;
            background: #333;
            padding: 15px;
            border-radius: 8px;
            white-space: pre-wrap;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: #4d97ff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .btn:hover { background: #357ae8; }
        #loader { font-size: 1.2rem; color: #4d97ff; }
    </style>
</head>
<body>

    <div class="container" id="main-content" style="display:none;">
        <img id="thumbnail" src="" alt="Project Thumbnail">
        <h1 id="title">Loading Project...</h1>
        <p id="author"></p>
        <div id="description"></div>
        <a id="scratch-link" class="btn" href="#">View on Scratch</a>
    </div>

    <div id="loader">Fetching data from Scratch...</div>

    <script>
        async function loadProject() {
            // 1. Get the ID from the URL: ?id=12345
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (!id) {
                document.getElementById('loader').innerText = "Error: No Project ID provided in URL.";
                return;
            }

            try {
                const response = await fetch(`https://api.scratch.mit.edu/projects/${id}`);
                if (!response.ok) throw new Error("Project not found");
                const data = await response.json();

                document.title = `${data.title} - My Scratch Portal`;
                document.getElementById('title').innerText = data.title;
                document.getElementById('author').innerText = `Created by: ${data.author.username}`;
                document.getElementById('description').innerText = data.instructions + "\n\n" + data.description;
                document.getElementById('thumbnail').src = data.images['510x312'] || data.images['282x210'];
                document.getElementById('scratch-link').href = `https://scratch.mit.edu/projects/${id}`;

                document.getElementById('main-content').style.display = 'block';
                document.getElementById('loader').style.display = 'none';

            } catch (err) {
                document.getElementById('loader').innerText = "Error: Could not load project. It might be unshared or the ID is wrong.";
            }
        }

        loadProject();
    </script>
</body>
</html>
