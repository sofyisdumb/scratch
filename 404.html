<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4d97ff">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .card {
            background: #1e1e1e;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 1px solid #333;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid #4d97ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #4d97ff;
        }

        p {
            color: #aaa;
            margin-bottom: 20px;
        }

        .error-msg {
            color: #ff4d4d;
            display: none;
        }
    </style>
</head>

<body>

    <div class="card">
        <div id="loader" class="spinner"></div>
        <h1 id="title">Redirecting...</h1>
        <p id="status">Fetching project data from Scratch...</p>
        <div id="error" class="error-msg">Project not found or invalid ID.</div>
    </div>

    <script>
        async function handleRedirect() {
            const statusText = document.getElementById('status');
            const errorText = document.getElementById('error');
            const loader = document.getElementById('loader');

            const path = window.location.pathname;
            const segments = path.split('/').filter(Boolean);
            const projectId = segments[segments.length - 1];

            if (!projectId || isNaN(projectId)) {
                showError("No valid Project ID found in the URL.");
                return;
            }

            try {
                const response = await fetch(`https://api.scratch.mit.edu/projects/${projectId}`);

                if (!response.ok) {
                    throw new Error("Project is unshared or private.");
                }

                const data = await response.json();
                statusText.innerText = `Found: ${data.title}. Teleporting...`;

                setTimeout(() => {
                    window.location.href = `https://scratch.mit.edu/projects/${projectId}/`;
                }, 500);

            } catch (err) {
                showError("This project might be unshared, or Scratch is down.");
            }
        }

        function showError(msg) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('title').innerText = "Oops!";
            document.getElementById('status').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').innerText = msg;
        }

        handleRedirect();
    </script>
</body>
</html>
